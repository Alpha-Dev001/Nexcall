<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexCall - Premium Video Chat</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .hero-section {
            text-align: center;
            padding: 80px 0;
            position: relative;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(75, 85, 229, 0.1) 100%);
        }

        .hero-title {
            font-size: 4.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
            line-height: 1.2;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .hero-subtitle {
            font-size: 1.25rem;
            font-weight: 400;
            color: #e2e8f6;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .premium-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .premium-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 35px 80px rgba(0, 0, 0, 0.4);
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .premium-input {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .premium-input:focus {
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }

        .premium-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .floating-label {
            position: absolute;
            top: 0.75rem;
            left: 1.25rem;
            background: rgba(0, 0, 0, 0.8);
            padding: 0.25rem 0.75rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #ffffff;
            pointer-events: none;
            z-index: 10;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: -1;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: #ffffff;
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .video-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            margin: 2rem 0;
        }

        .video-container {
            background: #111111;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            bottom: 1rem;
            left: 1rem;
            background: rgba(0, 0, 0, 0.7);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            color: #ffffff;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-online {
            background: #10b981;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }

        .status-connecting {
            background: #f59e0b;
            box-shadow: 0 0 10px rgba(107, 114, 128, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .controls-container {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .notification {
            position: fixed;
            top: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 12px;
            border-left: 4px solid #10b981;
            color: #ffffff;
            font-weight: 500;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
            max-width: 300px;
        }

        .notification-success {
            border-left-color: #10b981;
        }

        .notification-error {
            border-left-color: #ef4444;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-out {
            animation: fadeOut 0.3s ease-in;
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }

            to {
                opacity: 0;
                transform: translateY(-20px);
            }
        }

        .footer {
            text-align: center;
            padding: 2rem 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-text {
            color: #9ca3af;
            font-size: 0.875rem;
            font-weight: 500;
        }

        @media (min-width: 768px) {
            .video-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (min-width: 1024px) {
            .container {
                max-width: 1400px;
            }

            .video-grid {
                grid-template-columns: 1fr 1fr;
                gap: 3rem;
            }
        }
    </style>
</head>

<body class="antialiased">
    <div class="container">
        <!-- Hero Section -->
        <section class="hero-section">
            <div class="hero-title">NexCall</div>
            <div class="hero-subtitle">Premium Video Conferencing</div>
        </section>

        <!-- Main Content -->
        <main>
            <!-- Room Join Section -->
            <section id="roomSection" class="premium-card fade-in">
                <div class="input-group">
                    <input type="text" id="roomInput" placeholder="Enter room ID..." class="premium-input"
                        maxlength="50">
                    <div class="floating-label">Room ID</div>
                </div>

                <button onclick="joinRoom()" class="btn-primary">
                    Join Room
                </button>
            </section>

            <!-- Video Section -->
            <section id="videoSection" class="hidden fade-in">
                <div class="video-grid">
                    <!-- Local Video -->
                    <div class="video-container">
                        <div class="video-overlay">You</div>
                        <video id="localVideo" autoplay muted playsinline></video>
                    </div>

                    <!-- Remote Video -->
                    <div class="video-container">
                        <div id="remoteVideoContainer" class="hidden">
                            <div class="video-overlay">Remote User</div>
                        </div>
                        <video id="remoteVideo" autoplay playsinline></video>
                    </div>
                </div>

                <!-- Controls -->
                <div class="controls-container">
                    <button onclick="startCall()" id="startCallBtn" class="btn-primary">
                        Start Call
                    </button>

                    <button onclick="endCall()" id="endCallBtn" class="btn-secondary">
                        End Call
                    </button>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer>
            <div class="footer-text"> 2024 NexCall • Premium Video Conferencing</div>
        </footer>
        <!-- Controls -->
        <div class="premium-card p-6 fade-in">
            <div class="flex justify-center space-x-4">
                <button onclick="startCall()" id="startCallBtn"
                    class="btn-primary px-8 py-3 rounded-xl font-semibold hover:scale-105 transition-all duration-300 flex items-center justify-center space-x-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 10l4.553-2.276A1 1 0 0120 8.618v6.764a1 1 0 01-1.447.894L15 14m-6 0l-4.553 2.276A1 1 0 014 15.382V8.618a1 1 0 011.447-.894L9 4m6 0v6l4.553-2.276A1 1 0 0020 15.382V8.618a1 1 0 00-.447-.894L15 4z">
                        </path>
                    </svg>
                    <span>Start Call</span>
                </button>

                <button onclick="endCall()" id="endCallBtn"
                    class="btn-secondary px-8 py-3 rounded-xl font-semibold hover:scale-105 transition-all duration-300 flex items-center justify-center space-x-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 8l2-2m0 0l-2 2m2 2v8m0 0v-8m0 0a2 2 0 00-2 2H6a2 2 0 00-2-2V6a2 2 0 002-2h2m4 0a2 2 0 012 2v8a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2">
                        </path>
                    </svg>
                    <span>End Call</span>
                </button>
            </div>
        </div>
    </div>
    </div>

    <!-- Loading State -->
    <div id="loadingState" class="hidden w-full">
        <div class="premium-card p-12 text-center fade-in">
            <div class="flex flex-col items-center space-y-6">
                <div class="w-16 h-16 mx-auto mb-6">
                    <div class="w-4 h-4 bg-gray-800 rounded-full animate-pulse"></div>
                </div>
                <div class="text-center space-y-4">
                    <h3 class="text-xl font-semibold text-black mb-2">Connecting...</h3>
                    <p class="text-gray-600">Establishing secure connection to room</p>
                </div>
            </div>
        </div>
        </main>

        <!-- Footer -->
        <footer class="glass-overlay border-t border-white/10 p-6">
            <div class="max-w-7xl mx-auto text-center">
                <p class="text-gray-400 text-sm">
                    2024 NexCall • Premium Video Conferencing
                </p>
            </div>
        </footer>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>

</html>
