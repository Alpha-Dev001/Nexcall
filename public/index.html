<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexCall - Premium Video Chat</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000000 !important;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .premium-card {
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-overlay {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-container {
            background: #111111;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            border: 2px solid #000000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .btn-secondary {
            background: transparent;
            color: #ffffff;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .text-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transition: all 0.3s ease;
        }

        .text-input:focus {
            outline: none;
            border-color: #ffffff;
            box-shadow: 0 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .text-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        .fade-out {
            animation: fadeOut 0.3s ease-out;
        }

        .slide-up {
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .scale-in {
            animation: scaleIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }

            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .status-online {
            background: #10b981;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .status-connecting {
            background: #6b7280;
            box-shadow: 0 0 15px rgba(107, 114, 128, 0.4);
        }

        .status-offline {
            background: #ef4444;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        .premium-gradient {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .glow-effect {
            box-shadow: 0 0 40px rgba(102, 126, 234, 0.3);
        }

        .floating-label {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            color: #ffffff;
            font-size: 12px;
            font-weight: 500;
        }

        .notification-success {
            background: #10b981;
            color: #ffffff;
            border-left: 4px solid #10b981;
        }

        .notification-error {
            background: #ef4444;
            color: #ffffff;
            border-left: 4px solid #ef4444;
        }

        .notification-info {
            background: #3b82f6;
            color: #ffffff;
            border-left: 4px solid #3b82f6;
        }
    </style>
</head>

@keyframes fadeIn {
from {
opacity: 0;
transform: translateY(10px);
}
</div>
</div>
<div class="flex items-center space-x-6">
    <div class="flex items-center space-x-3">
        <div id="connectionStatus" class="status-indicator status-connecting w-3 h-3 rounded-full">
        </div>
        <span id="statusText" class="text-gray-400 text-sm">Connecting...</span>
    </div>
    <div id="userCount" class="text-gray-400 text-sm">
        <span class="font-medium">0</span> users
    </div>
</div>
</div>
</header>

<!-- Main Content -->
<main class="flex-1 flex items-center justify-center px-6 py-12">
    <div class="w-full max-w-4xl">
        <!-- Room Join Section -->
        <div id="roomSection" class="premium-card p-8 mb-8 fade-in">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold text-black mb-2">Start Video Call</h2>
                <p class="text-gray-600">Enter a room ID to begin your premium video experience</p>
            </div>

            <div class="space-y-6">
                <div class="relative">
                    <input type="text" id="roomInput" placeholder="Enter room ID..."
                        class="text-input w-full px-6 py-4 rounded-xl text-black placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-white transition-all duration-300"
                        maxlength="50">
                    <div
                        class="absolute right-4 top-1/2 transform -translate-y-1/2 floating-label px-3 py-1 rounded-lg text-xs font-medium text-gray-700">
                        Room ID
                    </div>
                </div>

                <button onclick="joinRoom()"
                    class="btn-primary w-full py-4 rounded-xl font-semibold text-lg hover:scale-105 transition-all duration-300 flex items-center justify-center space-x-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M11 16l-4-4m0 0l4 4m-4-4v8m0 0v8m8 0v8m0-8a2 2 0 00-2 2H6a2 2 0 00-2-2V6a2 2 0 002-2h2m4 0a2 2 0 012 2v8a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2">
                        </path>
                    </svg>
                    <span>Join Room</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Video Section -->
    <div id="videoSection" class="hidden w-full">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <!-- Local Video -->
            <div class="video-container glow-effect">
                <div
                    class="absolute top-4 left-4 z-10 floating-label px-3 py-1 rounded-lg text-xs font-medium text-gray-700">
                    You
                </div>
                <video id="localVideo" autoplay muted playsinline class="rounded-xl"></video>
            </div>

            <!-- Remote Video -->
            <div class="video-container glow-effect">
                <div id="remoteVideoContainer"
                    class="hidden absolute top-4 left-4 z-10 floating-label px-3 py-1 rounded-lg text-xs font-medium text-gray-700">
                    Remote User
                </div>
                <video id="remoteVideo" autoplay playsinline class="rounded-xl"></video>
            </div>
        </div>

        <!-- Controls -->
        <div class="premium-card p-6 fade-in">
            <div class="flex justify-center space-x-4">
                <button onclick="startCall()" id="startCallBtn"
                    class="btn-primary px-8 py-3 rounded-xl font-semibold hover:scale-105 transition-all duration-300 flex items-center justify-center space-x-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 10l4.553-2.276A1 1 0 0120 8.618v6.764a1 1 0 01-1.447.894L15 14m-6 0l-4.553 2.276A1 1 0 014 15.382V8.618a1 1 0 011.447-.894L9 4m6 0v6l4.553-2.276A1 1 0 0020 15.382V8.618a1 1 0 00-.447-.894L15 4z">
                        </path>
                    </svg>
                    <span>Start Call</span>
                </button>

                <button onclick="endCall()" id="endCallBtn"
                    class="btn-secondary px-8 py-3 rounded-xl font-semibold hover:scale-105 transition-all duration-300 flex items-center justify-center space-x-3">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 8l2-2m0 0l-2 2m2 2v8m0 0v-8m0 0a2 2 0 00-2 2H6a2 2 0 00-2-2V6a2 2 0 002-2h2m4 0a2 2 0 012 2v8a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2">
                        </path>
                    </svg>
                    <span>End Call</span>
                </button>
            </div>
        </div>
    </div>
    </div>

    <!-- Loading State -->
    <div id="loadingState" class="hidden w-full">
        <div class="premium-card p-12 text-center fade-in">
            <div class="flex flex-col items-center space-y-6">
                <div class="w-16 h-16 mx-auto mb-6">
                    <div class="w-4 h-4 bg-gray-800 rounded-full animate-pulse"></div>
                </div>
                <div class="text-center space-y-4">
                    <h3 class="text-xl font-semibold text-black mb-2">Connecting...</h3>
                    <p class="text-gray-600">Establishing secure connection to room</p>
                </div>
            </div>
        </div>
</main>

<!-- Footer -->
<footer class="glass-overlay border-t border-white/10 p-6">
    <div class="max-w-7xl mx-auto text-center">
        <p class="text-gray-400 text-sm">
            2024 NexCall • Premium Video Conferencing
        </p>
    </div>
</footer>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>

</html>
