<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexCall - Premium Video Chat</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .video-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .glow-effect {
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
        }

        .pulse-animation {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .5;
            }
        }

        .slide-up {
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-online {
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
        }

        .status-connecting {
            background: #f59e0b;
            box-shadow: 0 0 10px #f59e0b;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
            transform: translateY(0);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .floating-label {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
            max-width: 300px;
        }

        .notification-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
        }

        .notification-error {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4);
        }

        .notification-info {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        .slide-out {
            animation: slideOut 0.3s ease-in;
        }
    </style>
</head>

<body class="antialiased">
    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="glass-morphism border-b border-white/20 p-4">
            <div class="container mx-auto flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <div
                        class="w-10 h-10 bg-gradient-to-r from-blue-500 to-purple-600 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 10l4.553-2.276A1 1 0 0120 8.618v6.764a1 1 0 01-1.447.894L15 14m-6 0l-4.553 2.276A1 1 0 014 15.382V8.618a1 1 0 011.447-.894L9 4m6 0v6l4.553-2.276A1 1 0 0020 15.382V8.618a1 1 0 00-.447-.894L15 4z">
                            </path>
                        </svg>
                    </div>
                    <h1 class="text-2xl font-bold text-white">NexCall</h1>
                    <span class="text-white/70 text-sm">Premium Video Chat</span>
                </div>
                <div class="flex items-center space-x-4">
                    <div class="flex items-center space-x-2">
                        <div id="connectionStatus" class="status-indicator status-connecting"></div>
                        <span id="statusText" class="text-white/70 text-sm">Connecting...</span>
                    </div>
                    <div id="userCount" class="text-white/70 text-sm">
                        <span class="font-medium">0</span> users
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 container mx-auto px-4 py-8">
            <!-- Room Join Section -->
            <div id="roomSection" class="glass-morphism rounded-2xl p-8 mb-8 max-w-md mx-auto slide-up">
                <div class="text-center mb-6">
                    <h2 class="text-3xl font-bold text-white mb-2">Join a Room</h2>
                    <p class="text-white/70">Enter a room ID to start video calling</p>
                </div>

                <div class="space-y-4">
                    <div class="relative">
                        <input type="text" id="roomInput" placeholder="Enter room ID..."
                            class="w-full px-6 py-4 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition-all duration-200"
                            maxlength="50">
                        <div
                            class="absolute right-4 top-1/2 transform -translate-y-1/2 floating-label px-3 py-1 rounded-lg text-xs font-medium text-gray-700">
                            Room ID
                        </div>
                    </div>

                    <button onclick="joinRoom()"
                        class="btn-primary w-full py-4 rounded-xl text-white font-semibold flex items-center justify-center space-x-2 hover:scale-105 transition-all duration-200">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M11 16l-4-4m0 0l4 4m-4-4v8m0 0v8m8 0v8m0-8a2 2 0 00-2 2H6a2 2 0 00-2-2V6a2 2 0 002-2h2m4 0a2 2 0 012 2v8a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2">
                            </path>
                        </svg>
                        <span>Join Room</span>
                    </button>
                </div>
            </div>

            <!-- Video Section -->
            <div id="videoSection" class="hidden">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                    <!-- Local Video -->
                    <div class="video-container glow-effect">
                        <div
                            class="absolute top-4 left-4 z-10 floating-label px-3 py-1 rounded-lg text-xs font-medium text-gray-700">
                            You
                        </div>
                        <video id="localVideo" autoplay muted playsinline class="rounded-xl"></video>
                    </div>

                    <!-- Remote Video -->
                    <div class="video-container glow-effect">
                        <div id="remoteVideoContainer"
                            class="hidden absolute top-4 left-4 z-10 floating-label px-3 py-1 rounded-lg text-xs font-medium text-gray-700">
                            Remote User
                        </div>
                        <video id="remoteVideo" autoplay playsinline class="rounded-xl"></video>
                    </div>
                </div>

                <!-- Controls -->
                <div class="glass-morphism rounded-2xl p-6 max-w-md mx-auto">
                    <div class="flex justify-center space-x-4">
                        <button onclick="startCall()" id="startCallBtn"
                            class="btn-primary px-8 py-3 rounded-xl text-white font-semibold flex items-center space-x-2 hover:scale-105 transition-all duration-200">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 10l4.553-2.276A1 1 0 0120 8.618v6.764a1 1 0 01-1.447.894L15 14m-6 0l-4.553 2.276A1 1 0 014 15.382V8.618a1 1 0 011.447-.894L9 4m6 0v6l4.553-2.276A1 1 0 0020 15.382V8.618a1 1 0 00-.447-.894L15 4z">
                                </path>
                            </svg>
                            <span>Start Call</span>
                        </button>

                        <button onclick="endCall()" id="endCallBtn"
                            class="px-8 py-3 rounded-xl bg-red-500/20 border border-red-500/30 text-red-400 font-semibold hover:bg-red-500/30 transition-all duration-200">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 8l2-2m0 0l-2 2m2 2v8m0 0v-8m0 0a2 2 0 00-2 2H6a2 2 0 00-2-2V6a2 2 0 002-2h2m4 0a2 2 0 012 2v8a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2">
                                </path>
                            </svg>
                            <span>End Call</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="hidden glass-morphism rounded-2xl p-12 max-w-md mx-auto text-center">
                <div class="flex flex-col items-center space-y-4">
                    <div class="pulse-animation">
                        <svg class="w-16 h-16 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 10l4.553-2.276A1 1 0 0120 8.618v6.764a1 1 0 01-1.447.894L15 14m-6 0l-4.553 2.276A1 1 0 014 15.382V8.618a1 1 0 011.447-.894L9 4m6 0v6l4.553-2.276A1 1 0 0020 15.382V8.618a1 1 0 00-.447-.894L15 4z">
                            </path>
                        </svg>
                    </div>
                    <p class="text-white text-lg font-medium">Connecting to room...</p>
                    <p class="text-white/70 text-sm">Please wait while we establish the connection</p>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="glass-morphism border-t border-white/20 p-4">
            <div class="container mx-auto text-center">
                <p class="text-white/70 text-sm">
                    Made with ❤️ using WebRTC • Secure peer-to-peer video calling
                </p>
            </div>
        </footer>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>

</html>
